add_newline = true
command_timeout = 1000

format = """
[╭─ ](#928374)$username$hostname$directory$git_branch$git_status$fill$time
[╰─](#928374)$character"""

[fill]
symbol = " "

[username]
show_always = false
style_user = "bold #e78a4e"
style_root = "bold #ea6962"
format = "[$user]($style)@"

[hostname]
ssh_only = true
format = "[$hostname](bold #e78a4e) "

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold #7daea3"
format = "[$path]($style) "

[git_branch]
format = "[$branch](#d8a657) "

[git_status]
style = "#ea6962"
format = "([\\[$all_status$ahead_behind\\]]($style) )"
conflicted = "="
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "\\$${count}"
modified   = "!${count}"
staged     = "+${count}"
renamed    = "»${count}"
deleted    = "✘${count}"

[time]
disabled = false
time_format = "%H:%M"
style = "#928374"
format = "[$time]($style)"

[character]
success_symbol = "[❯](bold #a9b665)"
error_symbol   = "[❯](bold #ea6962)"
vicmd_symbol   = "[❮](bold #a9b665)"
